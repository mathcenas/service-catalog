services:
  client-manager:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    image: client-manager:latest
    container_name: client-manager
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "${APP_PORT:-3020}:80"
    networks:
      - npm_proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  npm_proxy:
    external: true
    name: ${NPM_NETWORK:-npm_proxy}
